name: 🔥 Brahmacharya Streak Reminder

on:
  schedule:
    - cron: '30 0 * * *'   # උදේ 6:00
    - cron: '30 6 * * *'   # දවල් 12:00
    - cron: '30 12 * * *'  # හවස 6:00
    - cron: '30 15 * * *'  # රාත්‍රී 9:00
    - cron: '30 18 * * *'  # මැදියම 00:00
  workflow_dispatch:

jobs:
  send-streak-notification:
    runs-on: ubuntu-latest
    steps:
      - name: 📅 Send Ultra Short & Beautiful Message
        run: |
          TZ='Asia/Colombo'
          START_DATE='2026-06-17'   # ඔබගේ ආරම්භක දිනය
          TARGET=90                 # ඉලක්ක දින ගණන

          start_epoch=$(TZ=$TZ date -d "$START_DATE 00:00:00" +%s)
          now_epoch=$(TZ=$TZ date +%s)
          days=$(( (now_epoch - start_epoch) / 86400 + 1 ))

          # 🕐 දවසේ කාලය අනුව ආචාරය
          hour=$(TZ=$TZ date +%H)
          if [ $hour -ge 5 ] && [ $hour -lt 12 ]; then
            greeting="🌅 උදෑසන"
          elif [ $hour -ge 12 ] && [ $hour -lt 17 ]; then
            greeting="☀️ මධ්‍යාහ්න"
          elif [ $hour -ge 17 ] && [ $hour -lt 21 ]; then
            greeting="🌇 සන්ධ්‍යාව"
          else
            greeting="🌙 රාත්‍රී"
          fi

          # 📊 ප්‍රගති ගණනය
          if [ $days -lt $TARGET ]; then
            percent=$(( days * 100 / TARGET ))
            filled=$(( days * 10 / TARGET ))
            remaining=$((TARGET - days))
          else
            percent=100
            filled=10
            remaining=0
          fi

          # ප්‍රගති තීරුව
          bar=""
          for ((i=0; i<filled; i++)); do bar+="🟩"; done
          for ((i=filled; i<10; i++)); do bar+="⬜"; done

          # 📅 සන්ධිස්ථාන
          weeks=$((days / 7))
          months=$((days / 30))
          next_week=$((7 - days % 7))
          [ $next_week -eq 7 ] && next_week=7

          # ✉️ කෙටිම හා ලස්සනම පණිවිඩය (පේළි 4ක්)
          message="❤️‍🔥💥 *දින $daysයි!* ($percent% සම්පූර්ණයි) 🎯 තව දින $remainingයි.
          📊 $bar
          📅 සති $weeks | මාස $months | ඊළඟ සතියට දින $next_weekයි.
          $greeting, සංවර ගමනේ $days වන දිනය. 💪"

          # 📤 Telegram වෙත යැවීම
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$message"
