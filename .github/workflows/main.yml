name: 🕉️ Brahmacharya Streak Reminder

on:
  schedule:
    # ලංකාවේ වේලාව (UTC+5:30) අනුව notify වෙන වෙලාවන් (cron UTC වලින්)
    # 🌅 උදේ 6:00  → UTC 0:30
    - cron: '30 0 * * *'
    # ☀️ දවල් 12:00 → UTC 6:30
    - cron: '30 6 * * *'
    # 🌇 හවස 6:00  → UTC 12:30
    - cron: '30 12 * * *'
    # 🌙 රාත්‍රී 9:00 → UTC 15:30
    - cron: '30 15 * * *'
    # 🌑 මැදියම 00:00 → UTC 18:30 (ඊළඟ දවසේ ආරම්භය)
    - cron: '30 18 * * *'

  workflow_dispatch:   # අවශ්‍ය විටක manually run කරන්න

jobs:
  send-streak-notification:
    runs-on: ubuntu-latest
    steps:
      - name: 📆 දින ගණන ගණනය කර Telegram message එවන්න
        run: |
          # ලංකාවේ වේලාවෙන් අද සහ ආරම්භක දිනය ගන්න
          start_epoch=$(TZ='Asia/Colombo' date -d '2026-06-17 00:00:00' +%s)
          now_epoch=$(TZ='Asia/Colombo' date +%s)
          
          # දින ගණන = (වෙනස / තත්පර 86400) + 1 (පළවෙනි දවසත් 1)
          days=$(( (now_epoch - start_epoch) / 86400 + 1 ))
          
          # ✨ ලස්සන පණිවිඩයක්
          message="🕉️ *ඔබේ බ්‍රහ්මචර්යාවේ ${days} වන දිනයයි.*
          
          🌱 _සංවරව ඉදිරියට යන්න. ඔබේ ආත්ම ශක්තිය දිනෙන් දින වැඩි වේවා!_
          
          ⏳ ${days} දවසක් පිරුණු ගමනක්..."
          
          # Telegram API එක හරහා message යවන්න
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="$message"
