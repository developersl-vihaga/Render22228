<!DOCTYPE html><html lang="si"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ප්‍රාණයාම සහකරු (3:12:6)</title>
    <style>
        :root {
            --bg-1: #020617;
            --bg-2: #0f172a;
            --bg-3: #111827;
            --card-bg: rgba(15, 23, 42, 0.72);
            --card-border: rgba(148, 163, 184, 0.18);
            --text-color: #f8fafc;
            --muted: #94a3b8;
            --accent-inhale: #22c55e;
            --accent-hold: #3b82f6;
            --accent-exhale: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(56, 189, 248, 0.14), transparent 30%),
                radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.10), transparent 25%),
                linear-gradient(160deg, var(--bg-1), var(--bg-2) 55%, var(--bg-3));
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 34px 28px;
            border-radius: 28px;
            box-shadow: 0 18px 60px rgba(0,0,0,0.45);
            max-width: 430px;
            width: 100%;
            border: 1px solid var(--card-border);
        }

        h1 {
            font-size: 1.7rem;
            margin: 0 0 8px;
            color: #e2e8f0;
            letter-spacing: 0.3px;
        }

        .ratio-badge {
            background: rgba(51, 65, 85, 0.7);
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 24px;
            color: #cbd5e1;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .circle-container {
            position: relative;
            width: 210px;
            height: 210px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 6px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.2rem;
            font-weight: 700;
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 0.8s ease, 
                        border-color 0.8s ease, 
                        color 0.8s ease,
                        background 0.8s ease;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.03), 0 0 24px rgba(0,0,0,0.22);
            position: relative;
            will-change: transform;
        }

        .circle::after {
            content: '';
            position: absolute;
            inset: 16px;
            border-radius: 50%;
            border: 1px dashed rgba(148, 163, 184, 0.18);
        }

        .nostril-indicator {
            font-size: 1.1rem;
            margin-top: 12px;
            font-weight: 600;
            color: #e2e8f0;
            min-height: 30px;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 14px 0 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-height: 40px;
        }

        .round-counter {
            font-size: 1rem;
            color: var(--muted);
            margin-bottom: 18px;
        }

        button {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border: none;
            padding: 13px 36px;
            font-size: 1.05rem;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.28);
        }

        button:hover {
            filter: brightness(1.06);
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        button:focus-visible {
            outline: 3px solid rgba(96, 165, 250, 0.8);
            outline-offset: 3px;
        }

        .inhale-state {
            border-color: var(--accent-inhale);
            box-shadow: 0 0 34px rgba(34, 197, 94, 0.35);
            transform: scale(1.12);
            color: var(--accent-inhale);
            animation: pulseInhale 1.2s ease-in-out infinite;
        }

        .hold-state {
            border-color: var(--accent-hold);
            box-shadow: 0 0 34px rgba(59, 130, 246, 0.35);
            transform: scale(1.12);
            color: var(--accent-hold);
            animation: pulseHold 1.8s ease-in-out infinite;
        }

        .exhale-state {
            border-color: var(--accent-exhale);
            box-shadow: 0 0 28px rgba(245, 158, 11, 0.22);
            transform: scale(1.02);
            color: var(--accent-exhale);
            animation: pulseExhale 1.4s ease-in-out infinite;
        }

        @keyframes pulseInhale {
            0%, 100% { box-shadow: 0 0 22px rgba(34, 197, 94, 0.22); }
            50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.42); }
        }

        @keyframes pulseHold {
            0%, 100% { box-shadow: 0 0 22px rgba(59, 130, 246, 0.22); }
            50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.42); }
        }

        @keyframes pulseExhale {
            0%, 100% { box-shadow: 0 0 18px rgba(245, 158, 11, 0.18); }
            50% { box-shadow: 0 0 34px rgba(245, 158, 11, 0.32); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 26px 18px;
                border-radius: 22px;
            }

            h1 {
                font-size: 1.45rem;
            }

            .circle-container {
                width: 180px;
                height: 180px;
            }

            .circle {
                font-size: 2.8rem;
            }

            .status-text {
                font-size: 1.3rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            .circle,
            button {
                transition: none;
            }

            .inhale-state,
            .hold-state,
            .exhale-state {
                animation: none;
            }
        }
    </style>
</head>
<body>

<div class="container" role="main" aria-label="ප්‍රාණයාම සහකරු">
    <h1>ප්‍රාණයාම සහකරු</h1>
    <div class="ratio-badge">Nadi Shodhana • 3 : 12 : 6</div>
    
    <div class="round-counter" aria-live="polite">වට සංඛ්‍යාව: <span id="roundCount">0</span></div>

    <div class="circle-container">
        <div class="circle" id="breathCircle" aria-live="polite" aria-atomic="true">0</div>
    </div>

    <div class="status-text" id="statusText" aria-live="polite">සූදානම් වන්න...</div>
    <div class="nostril-indicator" id="nostrilText" aria-live="polite">-</div>
    
    <button id="startBtn" onclick="toggleTimer()" aria-pressed="false">ආරම්භ කරන්න</button>
</div>

<script>
    let isRunning = false;
    let timer = null;
    let currentStep = 0;
    let count = 0;
    let rounds = 0;

    const circle = document.getElementById('breathCircle');
    const statusText = document.getElementById('statusText');
    const nostrilText = document.getElementById('nostrilText');
    const roundCountDisplay = document.getElementById('roundCount');
    const startBtn = document.getElementById('startBtn');

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq = 440, duration = 0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const steps = [
        { name: "හුස්ම ගන්න (Inhale)", nostril: "👈 වම් නාස් පුඩුවෙන්", time: 3, css: "inhale-state", tone: 600 },
        { name: "රඳවා ගන්න (Hold)", nostril: "🔒 නාස් පුඩු දෙකම වසා", time: 12, css: "hold-state", tone: 440 },
        { name: "පිට කරන්න (Exhale)", nostril: "👉 දකුණු නාස් පුඩුවෙන්", time: 6, css: "exhale-state", tone: 350 },
        { name: "හුස්ම ගන්න (Inhale)", nostril: "👉 දකුණු නාස් පුඩුවෙන්", time: 3, css: "inhale-state", tone: 600 },
        { name: "රඳවා ගන්න (Hold)", nostril: "🔒 නාස් පුඩු දෙකම වසා", time: 12, css: "hold-state", tone: 440 },
        { name: "පිට කරන්න (Exhale)", nostril: "👈 වම් නාස් පුඩුවෙන්", time: 6, css: "exhale-state", tone: 350 }
    ];

    function toggleTimer() {
        if (isRunning) {
            clearInterval(timer);
            isRunning = false;
            startBtn.innerText = "ආරම්භ කරන්න";
            startBtn.setAttribute('aria-pressed', 'false');
            statusText.innerText = "නතර කලා";
            nostrilText.innerText = "-";
            circle.className = "circle";
            circle.innerText = "0";
        } else {
            isRunning = true;
            startBtn.innerText = "නතර කරන්න";
            startBtn.setAttribute('aria-pressed', 'true');
            currentStep = 0;
            count = steps[currentStep].time;
            updateUI();
            playBeep(steps[currentStep].tone, 0.3);
            
            timer = setInterval(() => {
                count--;
                if (count <= 0) {
                    currentStep++;
                    if (currentStep >= steps.length) {
                        currentStep = 0;
                        rounds++;
                        roundCountDisplay.innerText = rounds;
                    }
                    count = steps[currentStep].time;
                    playBeep(steps[currentStep].tone, 0.3);
                } else {
                    if (count <= 3 && steps[currentStep].name !== "හුස්ම ගන්න (Inhale)") {
                        playBeep(440, 0.05);
                    }
                }
                updateUI();
            }, 1000);
        }
    }

    function updateUI() {
        const step = steps[currentStep];
        statusText.innerText = step.name;
        nostrilText.innerText = step.nostril;
        circle.innerText = count;
        circle.className = "circle " + step.css;
    }
</script>


</body></html>
